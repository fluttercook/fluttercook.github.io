name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check recipe front-matter
        run: |
          set -e
          fail=0
          for f in src/content/recipes/*.md; do
            for key in title package repo category; do
              grep -q "^$key:" "$f" || { echo "::error file=$f::missing '$key' in front-matter"; fail=1; }
            done
          done
          exit $fail
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        run: |
          npm ci
          npm run build
